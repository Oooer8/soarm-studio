<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SOARM Studio Docs</title>
    <meta name="description" content="Choose the English or Chinese SOARM Studio documentation." />
    <meta property="og:title" content="SOARM Studio Docs" />
    <meta property="og:description" content="Choose the English or Chinese SOARM Studio documentation." />
    <meta
      property="og:image"
      content="https://oooer8.github.io/soarm-studio/assets/brand/soarm-studio-logo-wordmark.png"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://oooer8.github.io/soarm-studio/" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="assets/brand/soarm-studio-logo-mark.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/docs.css" />
    <link rel="alternate" hreflang="en" href="https://oooer8.github.io/soarm-studio/en/index.html" />
    <link rel="alternate" hreflang="zh-CN" href="https://oooer8.github.io/soarm-studio/zh-CN/index.html" />
    <link rel="alternate" hreflang="x-default" href="https://oooer8.github.io/soarm-studio/" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img
          class="brand-logo"
          src="assets/brand/soarm-studio-logo-mark.svg"
          alt=""
          aria-hidden="true"
        />
        <span>SOARM Studio</span>
      </div>
      <nav class="topnav" aria-label="Primary">
        <a href="index.html" aria-current="page">Docs</a>
        <a href="https://github.com/Oooer8/soarm-studio#readme">README</a>
        <a href="https://github.com/Oooer8/soarm-studio">GitHub</a>
      </nav>
      <div class="top-actions">
        <label class="language-switcher">
          <span class="sr-only">Language</span>
          <select aria-label="Documentation language" data-language-switcher>
            <option value="" selected>Language / 语言</option>
            <option value="en" data-href="en/index.html">English</option>
            <option value="zh-CN" data-href="zh-CN/index.html">中文</option>
          </select>
        </label>
      </div>
    </header>

    <main>
      <section id="language" class="doc-page">
        <div class="crumbs">Docs</div>
        <h1>SOARM Studio Docs</h1>
        <p class="lead">
          English and Chinese documentation are maintained as equal versions.
          Choose a language to enter the docs.
        </p>
        <div class="cards">
          <article class="card">
            <h3>English</h3>
            <p>Read the SOARM Studio documentation in English.</p>
            <a href="en/index.html">Open English docs</a>
          </article>
          <article class="card">
            <h3>中文</h3>
            <p>阅读 SOARM Studio 中文文档。</p>
            <a href="zh-CN/index.html">打开中文文档</a>
          </article>
        </div>
      </section>
    </main>
    <script src="assets/docs.js"></script>
  </body>
</html>
